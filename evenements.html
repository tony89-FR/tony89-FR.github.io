<!DOCTYPE html>
<html lang="fr">
<head>
  <style>
.event-card{
    background:#1e1e2f;
    border-radius:15px;
    padding:20px;
    margin:20px 0;
    color:white;
    box-shadow:0 0 15px rgba(0,255,255,.2);
}
</style>
<meta charset="UTF-8">
<title>Événements</title>
</head>

<body style="background:#0b1020;color:white;font-family:Arial;text-align:center;padding:50px;">

<h1>🎉 Événements</h1>

<div id="events"></div>

<a href="index.html">⬅ Retour</a>
<script>
async function chargerEvents() {
    const response = await fetch(
        "https://la-communaute-live-bot.onrender.com/events"
    );

    const events = await response.json();

    const container = document.getElementById("events");

    if(events.length === 0){
        container.innerHTML = "<p>Aucun événement prévu.</p>";
        return;
    }

    container.innerHTML = "";

    events.forEach(event => {
        const date = new Date(event.startTime);

        container.innerHTML += `
            <div class="event-card">
                <h2>${event.name}</h2>
                <p>${event.description || "Aucune description"}</p>
                <p><strong>Date :</strong> ${date.toLocaleString("fr-FR")}</p>
            </div>
        `;
    });
}

chargerEvents();
</script>
</body>
</html>
